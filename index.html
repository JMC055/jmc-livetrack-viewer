<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMC LiveTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>JMC LiveTrack</h1>

        <div class="card">
            <p>Distance: <span id="distance">--</span> km</p>
            <p>Pace: <span id="pace">--</span></p>
            <p>Elapsed: <span id="elapsed">--</span></p>
            <p>Altitude: <span id="altitude">--</span> m</p>
            <p>D+ : <span id="dplus">--</span> m</p>
            <p>D- : <span id="dminus">--</span> m</p>
            <p>Latitude: <span id="lat">--</span></p>
            <p>Longitude: <span id="lon">--</span></p>
        </div>

        <p class="status">Auto refresh every 5 seconds</p>
    </div>

<script src="app.js"></script>
</body>
</html>
